<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparateur</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <aside class="sidebar" aria-label="Navigation principale">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <strong></strong>
          <small></small>
        </div>
      </div>
      <nav></nav>
      <div class="side-panel">
        <span></span>
        <strong></strong>
        <small></small>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <h1></h1>
          <p></p>
        </div>
        <div class="actions" aria-label="Filtres">
          <button type="button" class="ghost"></button>
          <button type="button"></button>
        </div>
      </header>

      <section class="intro">
        <div>
          <span class="label"></span>
          <strong></strong>
          <p></p>
        </div>
        <div class="metric">
          <span></span>
          <strong></strong>
        </div>
        <div class="metric">
          <span></span>
          <strong></strong>
        </div>
      </section>

      <section id="matrix" class="section">
        <div class="section-head">
          <div>
            <h2></h2>
            <p></p>
          </div>
          <span class="legend"></span>
        </div>
        <div class="table-shell">
          <table id="matrixTable"></table>
        </div>
      </section>

      <section id="cards" class="section">
        <div class="section-head">
          <div>
            <h2></h2>
            <p></p>
          </div>
        </div>
        <div class="cards" id="candidateCards"></div>
      </section>

      <section class="split">
        <article id="radar" class="section">
          <div class="section-head">
            <div>
              <h2></h2>
              <p></p>
            </div>
          </div>
          <div class="radar-wrap">
            <svg id="radarChart" viewBox="0 0 520 440" role="img" aria-label="Radar de comparaison des candidats"></svg>
          </div>
        </article>

        <article id="ranking" class="section">
          <div class="section-head">
            <div>
              <h2></h2>
              <p></p>
            </div>
          </div>
          <div id="rankingBars" class="bars"></div>
        </article>
      </section>

      <section id="heatmap" class="section">
        <div class="section-head">
          <div>
            <h2></h2>
            <p></p>
          </div>
          <div class="scale"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="table-shell">
          <table id="heatmapTable"></table>
        </div>
      </section>

      <section id="gaps" class="section">
        <div class="section-head">
          <div>
            <h2></h2>
            <p></p>
          </div>
        </div>
        <div id="gapRows" class="gap-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
